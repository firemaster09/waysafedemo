<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>WaySafe demo</title>
<style>
:root{--wine:#a91436;--salmon:#d7666d;--pink:#f4b9c7;--cream:#fff8f9;--ink:#551722}
*{box-sizing:border-box}html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:#f4eaed;color:var(--ink)}
body{display:grid;place-items:center;padding:12px}button,input{font:inherit}.phone{position:relative;width:min(390px,94vw,52vh);aspect-ratio:390/720;padding:10px;border-radius:45px;background:linear-gradient(90deg,#161616,#555 6%,#111 12%,#111 88%,#555 94%,#161616);box-shadow:0 24px 55px #2b12183f,inset 0 0 0 2px #777}.phone:before{content:"";position:absolute;z-index:30;top:12px;left:50%;width:38%;height:25px;transform:translateX(-50%);border-radius:0 0 16px 16px;background:#080808}.viewport{height:100%;overflow:hidden;border-radius:36px;background:var(--cream)}.track{height:200%;display:flex;flex-direction:column;transition:transform .72s cubic-bezier(.22,.75,.23,1)}.viewport.show-map .track{transform:translateY(-50%)}.screen{position:relative;flex:0 0 50%;overflow:hidden}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;padding:45px 22px 25px;background:#fff9fa}.brand{text-align:center}.brand img{width:100px;border-radius:22px;box-shadow:0 8px 18px #ae12342e}.brand h1{margin:4px 0 0;font-size:36px;color:#a3292d}.card{width:min(100%,285px);padding:14px;border-radius:18px;background:linear-gradient(135deg,#f1bac7,#efaebe)}.login-btn{padding:6px 16px;border:0;border-radius:999px;color:#fff;background:var(--salmon);cursor:pointer}.field{display:block;position:relative;margin-top:10px}.field small{position:absolute;z-index:2;top:5px;left:11px;color:#ffffffc7;font-size:8px}.field input{width:100%;height:49px;padding:17px 42px 6px 11px;border:0;border-radius:11px;outline:none;color:#fff;background:#d5686e}.field input::placeholder{color:#fff}.eye{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:0;background:transparent;color:#fff;font-size:20px;cursor:pointer}.socials{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:min(100%,300px)}.social{height:34px;border:1px solid #ccc;border-radius:999px;background:#fff;font-size:10px}
.map{background:url("map-bg.png") center/cover no-repeat}.map:after{content:"";position:absolute;inset:0;background:linear-gradient(#ffffff14,transparent 24%,transparent 74%,#ffffff24);pointer-events:none}.back{position:absolute;z-index:12;top:38px;left:18px;width:38px;height:38px;border:0;border-radius:50%;background:#fffffff0;color:var(--wine);font-size:24px;cursor:pointer;opacity:0;pointer-events:none;transition:.2s}.viewport.show-map .back{opacity:1;pointer-events:auto}.search-wrap{position:absolute;z-index:10;top:38px;left:18px;right:18px;padding-left:46px}.search{width:100%;height:48px;padding:0 16px;border:2px solid #e8aeba;border-radius:18px;background:#fffafbee;outline:none;box-shadow:0 6px 20px #47222b21}
.top-action{position:absolute;z-index:13;top:126px;right:18px;width:48px;height:48px;border:0;border-radius:16px;background:#fffffff0;color:var(--wine);display:grid;place-items:center;box-shadow:0 5px 18px #3d242a2e;cursor:pointer}.close-mode{display:none;color:#fff;background:linear-gradient(#d7666d,#bc4e58);font-size:28px}.map.emergency .alert-btn,.map.drawing .alert-btn{display:none}.map.emergency .close-mode,.map.drawing .close-mode{display:grid}.pin{position:absolute;z-index:9;left:55%;top:49%;width:28px;height:28px;transform:translate(-50%,-50%) rotate(45deg) scale(.4);border-radius:50% 50% 50% 0;background:#c71f23;box-shadow:0 4px 10px #0004;opacity:0;transition:.2s}.pin:after{content:"";position:absolute;inset:7px;border-radius:50%;background:#f6d5d3}.map.emergency .pin{opacity:1;transform:translate(-50%,-50%) rotate(45deg) scale(1)}
.draw-canvas{position:absolute;z-index:8;inset:0;width:100%;height:100%;pointer-events:none}.map.drawing .draw-canvas{pointer-events:auto;cursor:crosshair}.tool-row{position:absolute;z-index:12;left:16px;right:16px;bottom:102px;display:flex;justify-content:flex-end;gap:10px}.tool{min-width:82px;height:48px;padding:0 12px;border:2px solid #efaebe;border-radius:16px;background:#fffafbee;color:var(--wine);box-shadow:0 5px 18px #3d242a22;font-size:11px;font-weight:700;cursor:pointer}.tool.active{background:var(--salmon);color:#fff}.map.drawing .tool-row{opacity:0;pointer-events:none}
.bottom-nav{position:absolute;z-index:14;left:12px;right:12px;bottom:10px;height:82px;padding:14px 13px 8px;border-radius:28px 28px 18px 18px;background:#f7b9c8f5;display:grid;grid-template-columns:repeat(3,1fr);align-items:end;box-shadow:0 -4px 18px #46212a1f}.nav{border:0;background:transparent;color:#b94452;display:grid;justify-items:center;gap:3px;font-size:10px;cursor:pointer}.icon{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:#d7656c;color:#fff;font-size:19px}.nav:first-child .icon{background:#fff6f7;color:#c14b58;border:2px solid #c55b66}
.sheet-backdrop{position:absolute;z-index:18;inset:0;background:#53121d42;opacity:0;pointer-events:none;transition:.25s}.contacts-sheet{position:absolute;z-index:19;left:0;right:0;bottom:0;height:62%;padding:12px 18px 18px;border-radius:28px 28px 0 0;background:#fff8fa;transform:translateY(105%);transition:transform .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 -15px 40px #4c1b2733;display:flex;flex-direction:column;overflow:hidden}.map.contacts-open .sheet-backdrop{opacity:1;pointer-events:auto}.map.contacts-open .contacts-sheet{transform:translateY(0)}.sheet-handle{flex:0 0 auto;width:42px;height:5px;margin:0 auto 10px;border-radius:5px;background:#e0a6b3}.sheet-head{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between}.sheet-head h2{margin:4px 0 12px;font-size:20px}.sheet-close{width:36px;height:36px;border:0;border-radius:50%;background:#f4c0cc;color:var(--wine);font-size:22px;cursor:pointer}.contacts-list{min-height:0;flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding:0 2px 16px 0;scrollbar-width:thin;scrollbar-color:#dfa0af transparent}.contacts-list::-webkit-scrollbar{width:5px}.contacts-list::-webkit-scrollbar-thumb{background:#dfa0af;border-radius:999px}.contact{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid #efd8dd}.avatar{flex:0 0 auto;width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#d7656c;color:#fff;font-weight:800}.contact strong{display:block}.contact span{font-size:12px;color:#86525d}.call{margin-left:auto;border:0;border-radius:999px;padding:8px 12px;background:#f1b4c2;color:var(--wine);font-weight:700;cursor:pointer}
.toast{position:fixed;z-index:50;left:50%;bottom:10px;transform:translate(-50%,20px);padding:8px 13px;border-radius:999px;background:#231b1eea;color:#fff;font-size:12px;opacity:0;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<main class="phone"><div class="viewport" id="viewport"><div class="track">
<section class="screen login"><div class="brand"><img src="logo.png" alt="WaySafe"><h1>WAYSAFE</h1></div><form class="card" id="loginForm"><button class="login-btn">LOGIN</button><label class="field"><small>Username / e-mail</small><input type="text" placeholder="Maria Rossi" autocomplete="username"></label><label class="field"><small>Password</small><input id="password" type="password" placeholder="**************" autocomplete="current-password"><button class="eye" id="eye" type="button" aria-label="Mostra password">◉</button></label></form><div class="socials"><button class="social">Sign in with Google</button><button class="social">Sign in with Apple</button></div></section>
<section class="screen map" id="map"><button class="back" id="back">‹</button><div class="search-wrap"><input class="search" placeholder="Search bar"></div>
<button class="top-action alert-btn" id="alert" aria-label="Segnala emergenza">⚠</button><button class="top-action close-mode" id="closeMode" aria-label="Chiudi modalità">×</button><div class="pin" id="pin"></div><canvas class="draw-canvas" id="canvas"></canvas>
<div class="tool-row"><button class="tool" id="drawArea">Disegna area</button></div>
<nav class="bottom-nav"><button class="nav"><span class="icon">⚙</span><span>settings</span></button><button class="nav" id="contacts"><span class="icon">👥</span><span>contacts</span></button><button class="nav"><span class="icon">☎</span><span>911</span></button></nav>
<div class="sheet-backdrop" id="sheetBackdrop"></div><aside class="contacts-sheet" aria-label="Contatti"><div class="sheet-handle"></div><div class="sheet-head"><h2>Contatti</h2><button class="sheet-close" id="closeContacts">×</button></div>
<div class="contacts-list" role="list">
<div class="contact" role="listitem"><div class="avatar">MR</div><div><strong>Marco Rossi</strong><span>Fratello</span></div><button class="call">Chiama</button></div>
<div class="contact" role="listitem"><div class="avatar">GL</div><div><strong>Giulia Lombardi</strong><span>Amica</span></div><button class="call">Chiama</button></div>
<div class="contact" role="listitem"><div class="avatar">AB</div><div><strong>Andrea Bianchi</strong><span>Collega</span></div><button class="call">Chiama</button></div>
<div class="contact" role="listitem"><div class="avatar">SF</div><div><strong>Sara Ferrari</strong><span>Contatto di emergenza</span></div><button class="call">Chiama</button></div>
<div class="contact" role="listitem"><div class="avatar">LB</div><div><strong>Luca Bianchi</strong><span>Amico</span></div><button class="call">Chiama</button></div>
<div class="contact" role="listitem"><div class="avatar">EV</div><div><strong>Elena Verdi</strong><span>Coinquilina</span></div><button class="call">Chiama</button></div>
<div class="contact" role="listitem"><div class="avatar">GM</div><div><strong>Giovanni Marino</strong><span>Padre</span></div><button class="call">Chiama</button></div>
</div></aside></section>
</div></div></main><div class="toast" id="toast"></div>
<script>
const $=s=>document.querySelector(s), viewport=$('#viewport'),map=$('#map'),form=$('#loginForm'),password=$('#password'),eye=$('#eye'),pin=$('#pin'),canvas=$('#canvas'),ctx=canvas.getContext('2d');
let drawing=false,currentPath=[],shapes=[];
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),1700)}
form.addEventListener('submit',e=>{e.preventDefault();viewport.classList.add('show-map');resizeCanvas()});
eye.onclick=()=>{password.type=password.type==='password'?'text':'password';eye.textContent=password.type==='text'?'⊘':'◉'};
$('#back').onclick=()=>{viewport.classList.remove('show-map');resetModes()};
function resetModes(){map.classList.remove('emergency','drawing','contacts-open');drawing=false;currentPath=[]}
$('#alert').onclick=()=>{resetModes();map.classList.add('emergency');toast('Tocca la mappa per posizionare il pericolo')};
$('#drawArea').onclick=()=>{resetModes();map.classList.add('drawing');toast('Trascina il dito per delimitare un’area')};
$('#closeMode').onclick=()=>{map.classList.remove('emergency','drawing');drawing=false;currentPath=[];renderCanvas();toast('Modalità chiusa')};
map.addEventListener('click',e=>{if(!map.classList.contains('emergency')||e.target.closest('button,input,nav,aside'))return;const r=map.getBoundingClientRect();pin.style.left=(e.clientX-r.left)+'px';pin.style.top=(e.clientY-r.top)+'px';toast('Pericolo posizionato')});
function resizeCanvas(){const r=map.getBoundingClientRect(),d=window.devicePixelRatio||1;canvas.width=Math.round(r.width*d);canvas.height=Math.round(r.height*d);canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';ctx.setTransform(d,0,0,d,0,0);renderCanvas()}
window.addEventListener('resize',resizeCanvas);
function pos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
function drawPolygon(points,preview=false){if(points.length<2)return;ctx.save();ctx.beginPath();ctx.moveTo(points[0].x,points[0].y);for(let i=1;i<points.length;i++)ctx.lineTo(points[i].x,points[i].y);if(points.length>2)ctx.closePath();ctx.lineJoin='round';ctx.lineCap='round';ctx.lineWidth=4;ctx.strokeStyle='rgba(145,25,48,.82)';ctx.fillStyle=preview?'rgba(215,102,109,.18)':'rgba(215,102,109,.30)';if(points.length>2)ctx.fill();ctx.stroke();ctx.restore()}
function renderCanvas(){const r=canvas.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);shapes.forEach(s=>drawPolygon(s,false));if(currentPath.length)drawPolygon(currentPath,true)}
function start(e){if(!map.classList.contains('drawing'))return;e.preventDefault();canvas.setPointerCapture?.(e.pointerId);drawing=true;currentPath=[pos(e)];renderCanvas()}
function move(e){if(!drawing)return;e.preventDefault();const p=pos(e),last=currentPath[currentPath.length-1];if(!last||Math.hypot(p.x-last.x,p.y-last.y)>3){currentPath.push(p);renderCanvas()}}
function end(e){if(!drawing)return;e?.preventDefault();drawing=false;if(currentPath.length>2){shapes.push(currentPath.slice());toast('Area di pericolo evidenziata')}currentPath=[];renderCanvas()}
canvas.addEventListener('pointerdown',start);canvas.addEventListener('pointermove',move);canvas.addEventListener('pointerup',end);canvas.addEventListener('pointercancel',end);canvas.addEventListener('pointerleave',e=>{if(e.buttons===0)end(e)});
$('#contacts').onclick=()=>{map.classList.remove('emergency','drawing');map.classList.add('contacts-open');const list=document.querySelector('.contacts-list');if(list)list.scrollTop=0};
$('#closeContacts').onclick=$('#sheetBackdrop').onclick=()=>map.classList.remove('contacts-open');
document.querySelectorAll('.call').forEach(b=>b.onclick=()=>toast('Chiamata simulata'));
</script></body></html>
